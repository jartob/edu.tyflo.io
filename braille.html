<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Nauka BrailleвҖҷa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 10px;
  text-align: center;
}
button {
  margin: 5px;
  padding: 10px;
  font-size: 18px;
<button style="all: unset; font-family: Arial; font-size:20px; border:1px solid #ccc; padding:10px; margin:5px; display:inline-block; cursor:pointer;" onclick="showBig('${l}')">
  ${l}
</button>
}
.big {
  font-size: 40px;
}
textarea {
  width: 100%;
  height: 200px;
}
</style>
</head>

<body>

<h2>рҹ“ҳ Nauka alfabetu BrailleвҖҷa</h2>

<button onclick="showMode('learn')">Nauka</button>
<button onclick="showMode('practice')">ДҶwiczenia</button>
<button onclick="showMode('quiz')">Quiz</button>
<button onclick="showMode('wordwall')">Wordwall</button>

<hr>

<div id="app"></div>

<script>
const braille = {
A:"в Ғ",B:"в ғ",C:"в ү",D:"в ҷ",E:"в ‘",F:"в Ӣ",G:"в ӣ",H:"в “",I:"в Ҡ",J:"в ҡ",
K:"в …",L:"в Ү",M:"в Қ",N:"в қ",O:"в •",P:"в Ҹ",Q:"в ҹ",R:"в —",S:"в Һ",T:"в һ",
U:"в Ҙ",V:"в §",W:"в ә",X:"в ӯ",Y:"в Ҫ",Z:"в ө"
};

let currentMode = "learn";
let quizLetter = "";

// рҹ”Ҡ LEKTOR
function speak(text){
  const msg = new SpeechSynthesisUtterance();
  msg.text = text;
  msg.lang = "pl-PL";
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function showMode(mode){
  currentMode = mode;
  render();
}

function render(){
  const app = document.getElementById("app");

  if(currentMode === "learn"){
    app.innerHTML = "<h3>рҹҹў Nauka</h3><p>Kliknij literДҷ (usЕӮyszysz jД…):</p>";
    Object.keys(braille).forEach(l=>{
      app.innerHTML += `
        <button onclick="showBig('${l}')"</button>
      `;
    });
  }

  if(currentMode === "practice"){
    app.innerHTML = "<h3>рҹҹЎ ДҶwiczenia</h3><p>Kliknij i odsЕӮoЕ„:</p>";
    Object.keys(braille).forEach(l=>{
      app.innerHTML += `
        <button onclick="speak('${l}'); this.innerHTML='${l} = ${braille[l]}'">${l}</button>
      `;
    });
  }

  if(currentMode === "quiz"){
    const keys = Object.keys(braille);
    quizLetter = keys[Math.floor(Math.random()*keys.length)];

    app.innerHTML = `
      <h3>рҹ”ө Quiz</h3>
      <p>Co to za litera?</p>
      <div class="big">${braille[quizLetter]}</div>
    `;

    speak("ZnajdЕә literДҷ");

    keys.slice(0,5).forEach(l=>{
      app.innerHTML += `<button onclick="check('${l}')">${l}</button>`;
    });
  }

  if(currentMode === "wordwall"){
    app.innerHTML = `
      <h3>рҹҹЈ Wordwall вҖ“ zestaw</h3>
      <p>Skopiuj i wklej do Wordwall:</p>
      <textarea>
A - в Ғ
B - в ғ
C - в ү
D - в ҷ
E - в ‘
F - в Ӣ
G - в ӣ
H - в “
I - в Ҡ
J - в ҡ
K - в …
L - в Ү
M - в Қ
N - в қ
O - в •
P - в Ҹ
Q - в ҹ
R - в —
S - в Һ
T - в һ
U - в Ҙ
V - в §
W - в ә
X - в ӯ
Y - в Ҫ
Z - в ө
      </textarea>
    `;
  }
}

function check(ans){
  speak(ans);
  if(ans === quizLetter){
    speak("Dobrze");
    alert("вң… Dobrze!");
  } else {
    speak("SprГіbuj jeszcze raz");
    alert("вқҢ SprГіbuj jeszcze raz");
  }
}
function showBig(letter){
  speak(letter);
  document.getElementById("app").innerHTML = `
    <h3>рҹҹў Nauka</h3>
    <div style="font-size:80px; margin:20px">${letter}</div>
    <div style="font-size:80px; margin:20px">${braille[letter]}</div>
    <button onclick="render()">в¬…пёҸ WrГіДҮ</button>
  `;
}

render();
</script>

</body>
</html>
