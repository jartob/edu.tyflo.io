<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Nauka Braille‚Äôa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 10px;
  text-align: center;
}
button {
  margin: 5px;
  padding: 10px;
  font-size: 18px;
  <button style="font-family: Arial;" onclick="showBig('${l}')">

}
.big {
  font-size: 40px;
}
textarea {
  width: 100%;
  height: 200px;
}
</style>
</head>

<body>

<h2>ūüďė Nauka alfabetu Braille‚Äôa</h2>

<button onclick="showMode('learn')">Nauka</button>
<button onclick="showMode('practice')">ńÜwiczenia</button>
<button onclick="showMode('quiz')">Quiz</button>
<button onclick="showMode('wordwall')">Wordwall</button>

<hr>

<div id="app"></div>

<script>
const braille = {
A:"‚†Ā",B:"‚†É",C:"‚†Č",D:"‚†ô",E:"‚†Ď",F:"‚†č",G:"‚†õ",H:"‚†ď",I:"‚†ä",J:"‚†ö",
K:"‚†Ö",L:"‚†á",M:"‚†ć",N:"‚†Ě",O:"‚†ē",P:"‚†Ź",Q:"‚†ü",R:"‚†ó",S:"‚†é",T:"‚†ě",
U:"‚†•",V:"‚†ß",W:"‚†ļ",X:"‚†≠",Y:"‚†Ĺ",Z:"‚†Ķ"
};

let currentMode = "learn";
let quizLetter = "";

// ūüĒä LEKTOR
function speak(text){
  const msg = new SpeechSynthesisUtterance();
  msg.text = text;
  msg.lang = "pl-PL";
  msg.rate = 0.9;
  window.speechSynthesis.speak(msg);
}

function showMode(mode){
  currentMode = mode;
  render();
}

function render(){
  const app = document.getElementById("app");

  if(currentMode === "learn"){
    app.innerHTML = "<h3>ūüüĘ Nauka</h3><p>Kliknij literńô (usŇāyszysz jńÖ):</p>";
    Object.keys(braille).forEach(l=>{
      app.innerHTML += `
        <button onclick="showBig('${l}')"</button>
      `;
    });
  }

  if(currentMode === "practice"){
    app.innerHTML = "<h3>ūüü° ńÜwiczenia</h3><p>Kliknij i odsŇāoŇĄ:</p>";
    Object.keys(braille).forEach(l=>{
      app.innerHTML += `
        <button onclick="speak('${l}'); this.innerHTML='${l} = ${braille[l]}'">${l}</button>
      `;
    });
  }

  if(currentMode === "quiz"){
    const keys = Object.keys(braille);
    quizLetter = keys[Math.floor(Math.random()*keys.length)];

    app.innerHTML = `
      <h3>ūüĒĶ Quiz</h3>
      <p>Co to za litera?</p>
      <div class="big">${braille[quizLetter]}</div>
    `;

    speak("ZnajdŇļ literńô");

    keys.slice(0,5).forEach(l=>{
      app.innerHTML += `<button onclick="check('${l}')">${l}</button>`;
    });
  }

  if(currentMode === "wordwall"){
    app.innerHTML = `
      <h3>ūüü£ Wordwall ‚Äď zestaw</h3>
      <p>Skopiuj i wklej do Wordwall:</p>
      <textarea>
A - ‚†Ā
B - ‚†É
C - ‚†Č
D - ‚†ô
E - ‚†Ď
F - ‚†č
G - ‚†õ
H - ‚†ď
I - ‚†ä
J - ‚†ö
K - ‚†Ö
L - ‚†á
M - ‚†ć
N - ‚†Ě
O - ‚†ē
P - ‚†Ź
Q - ‚†ü
R - ‚†ó
S - ‚†é
T - ‚†ě
U - ‚†•
V - ‚†ß
W - ‚†ļ
X - ‚†≠
Y - ‚†Ĺ
Z - ‚†Ķ
      </textarea>
    `;
  }
}

function check(ans){
  speak(ans);
  if(ans === quizLetter){
    speak("Dobrze");
    alert("‚úÖ Dobrze!");
  } else {
    speak("Spr√≥buj jeszcze raz");
    alert("‚ĚĆ Spr√≥buj jeszcze raz");
  }
}
function showBig(letter){
  speak(letter);
  document.getElementById("app").innerHTML = `
    <h3>ūüüĘ Nauka</h3>
    <div style="font-size:80px; margin:20px">${letter}</div>
    <div style="font-size:80px; margin:20px">${braille[letter]}</div>
    <button onclick="render()">‚¨ÖÔłŹ Wr√≥ńá</button>
  `;
}

render();
</script>

</body>
</html>
